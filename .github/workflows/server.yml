name: server

on:
  push:
    branches: [main]
    paths: ["server/**", ".github/workflows/server.yml"]
  pull_request:
    paths: ["server/**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (core only; Windows extras are skipped on Linux)
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest ruff
      - name: Lint
        run: ruff check desklink
      - name: Test protocol
        run: pytest -q
