<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeskLink — Web Test Client</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; font: 15px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    color: #f5f5f7;
    background: linear-gradient(180deg, #1a1a1c, #0a0a0b);
    display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px;
  }
  .app { width: 100%; max-width: 420px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -.02em; }
  .sub { color: #98989d; font-size: 13px; margin-bottom: 20px; }
  .card {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.10);
    backdrop-filter: blur(20px) saturate(160%);
    border-radius: 22px; padding: 18px; margin-bottom: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  label { display: block; font-size: 12px; color: #98989d; margin: 0 0 6px; }
  input {
    width: 100%; padding: 11px 13px; border-radius: 13px; border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.25); color: #f5f5f7; font-size: 15px; margin-bottom: 12px;
  }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  button {
    appearance: none; border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.08); color: #f5f5f7; font-size: 15px; font-weight: 500;
    padding: 12px; border-radius: 14px; cursor: pointer; transition: .15s; user-select: none;
  }
  button:hover { background: rgba(255,255,255,.14); }
  button:disabled { opacity: .4; cursor: default; }
  button.primary { background: rgba(255,255,255,.92); color: #111; border-color: transparent; }
  button.active { background: rgba(255,255,255,.92); color: #111; }
  .player { text-align: center; }
  .art {
    width: 220px; height: 220px; margin: 4px auto 16px; border-radius: 18px;
    background: rgba(255,255,255,.06) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center; font-size: 40px; color: #6b6b70;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
  }
  .title { font-size: 18px; font-weight: 600; }
  .artist { color: #98989d; font-size: 14px; }
  .app-src { color: #6b6b70; font-size: 12px; margin-top: 2px; }
  .controls { display: flex; gap: 12px; justify-content: center; align-items: center; margin: 18px 0; }
  .controls button { flex: 0 0 auto; width: 56px; height: 56px; border-radius: 50%; font-size: 18px; }
  .controls .play { width: 68px; height: 68px; font-size: 22px; }
  .toggles { display: flex; gap: 10px; }
  .status { font-size: 12px; color: #98989d; text-align: center; margin-top: 8px; min-height: 16px; }
  .pill { display:inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; background: rgba(255,255,255,.1); margin-left:6px;}
  .hide { display: none; }
  .warn { color: #ffd479; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">
  <h1>DeskLink</h1>
  <div class="sub">Web test client — verify your PC server before the iPhone app is built.</div>

  <!-- Connect -->
  <div class="card" id="connectCard">
    <label>Server address (shown by the desktop app)</label>
    <input id="addr" placeholder="192.168.1.50:8765" autocomplete="off" />
    <label>Pairing code (leave blank if disabled)</label>
    <input id="code" placeholder="000000" inputmode="numeric" maxlength="6" autocomplete="off" />
    <button class="primary" id="connectBtn">Connect</button>
    <div class="warn" id="opusWarn"></div>
    <div class="status" id="connStatus"></div>
  </div>

  <!-- Player -->
  <div class="card player hide" id="playerCard">
    <div class="art" id="art">♪</div>
    <div class="title" id="title">Nothing playing</div>
    <div class="artist" id="artist"></div>
    <div class="app-src" id="appSrc"></div>

    <div class="controls">
      <button id="prevBtn" title="Previous">⏮</button>
      <button class="play" id="playBtn" title="Play/Pause">⏯</button>
      <button id="nextBtn" title="Next">⏭</button>
    </div>

    <div class="toggles">
      <button id="muteBtn" style="flex:1">🔊 Listening</button>
      <button id="disconnectBtn" style="flex:1">Disconnect</button>
    </div>
    <div class="status" id="playStatus">connected<span class="pill" id="codecPill"></span></div>
  </div>
</div>

<script>
"use strict";
// DeskLink web test client. Mirrors the protocol in server/desklink/protocol.py.
// Plays the PCM playback stream via Web Audio. (Run the server with --no-opus for
// the browser path, since we decode raw s16le here.)

const $ = (id) => document.getElementById(id);
const SR = 48000, CH = 2;

let ws = null, audioCtx = null, nextStartTime = 0, playbackCodec = "pcm", muted = false;

function setStatus(el, msg) { $(el).textContent = msg; }

function connect() {
  const addr = $("addr").value.trim();
  if (!addr) { setStatus("connStatus", "Enter the server address."); return; }
  const url = "ws://" + addr.replace(/^ws:\/\//, "");
  setStatus("connStatus", "Connecting to " + url + " …");
  try { ws = new WebSocket(url); } catch (e) { setStatus("connStatus", "Bad address."); return; }
  ws.binaryType = "arraybuffer";

  ws.onopen = () => setStatus("connStatus", "Connected, waiting for handshake…");
  ws.onclose = () => { setStatus("connStatus", "Disconnected."); showPlayer(false); stopAudio(); };
  ws.onerror = () => setStatus("connStatus", "Connection error. Same Wi-Fi? Correct IP/port?");
  ws.onmessage = onMessage;
}

function onMessage(ev) {
  if (typeof ev.data === "string") { onControl(JSON.parse(ev.data)); return; }
  onBinary(new Uint8Array(ev.data));
}

function onControl(msg) {
  switch (msg.type) {
    case "hello": {
      const code = $("code").value.trim();
      if (msg.pairing_required && !code) { setStatus("connStatus", "This server needs a pairing code."); return; }
      const serverCodec = (msg.audio && msg.audio.playback && msg.audio.playback.codec) || "pcm";
      // The browser path decodes PCM only.
      $("opusWarn").textContent = serverCodec === "opus"
        ? "Server is using Opus — for this web client, restart it with:  desklink --no-opus"
        : "";
      ws.send(JSON.stringify({
        type: "join", client: "Web Test Client",
        pairing_code: code || undefined,
        capabilities: ["audio.playback", "meta.nowplaying", "transport"],
        audio: { playback: { codec: "pcm" }, mic: { codec: "pcm" } }
      }));
      break;
    }
    case "ready":
      playbackCodec = (msg.audio && msg.audio.playback && msg.audio.playback.codec) || "pcm";
      $("codecPill").textContent = playbackCodec.toUpperCase();
      startAudio(); showPlayer(true);
      setStatus("connStatus", "");
      break;
    case "nowplaying": renderNowPlaying(msg); break;
    case "transport_state":
      $("nextBtn").disabled = !msg.canNext;
      $("prevBtn").disabled = !msg.canPrev;
      break;
    case "bye": setStatus("connStatus", "Server closed: " + (msg.reason || "")); break;
  }
}

function renderNowPlaying(m) {
  $("title").textContent = m.title || "Nothing playing";
  $("artist").textContent = m.artist || "";
  $("appSrc").textContent = m.app ? "via " + friendlyApp(m.app) : "";
  $("playBtn").textContent = m.playing ? "⏸" : "▶";
  if (m.artwork) { $("art").style.backgroundImage = "url(data:image/jpeg;base64," + m.artwork + ")"; $("art").textContent = ""; }
}

function friendlyApp(id) {
  const s = id.toLowerCase();
  if (s.includes("spotify")) return "Spotify";
  if (s.includes("apple") || s.includes("music")) return "Apple Music";
  if (s.includes("chrome")) return "Chrome";
  if (s.includes("edge")) return "Edge";
  return id;
}

// ---- audio (PCM playback) ----
function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SR });
  nextStartTime = 0;
}
function stopAudio() { if (audioCtx) { audioCtx.close(); audioCtx = null; } }

function onBinary(bytes) {
  if (!audioCtx || muted || playbackCodec !== "pcm") return;
  const streamId = bytes[0];
  if (streamId !== 1) return;            // 1 == playback
  // Skip 1-byte id + 8-byte timestamp; rest is s16le interleaved stereo.
  const pcm = new DataView(bytes.buffer, 9);
  const frames = Math.floor(pcm.byteLength / (2 * CH));
  if (frames <= 0) return;
  const buf = audioCtx.createBuffer(CH, frames, SR);
  const l = buf.getChannelData(0), r = buf.getChannelData(1);
  for (let i = 0; i < frames; i++) {
    l[i] = pcm.getInt16(i * 4, true) / 32768;
    r[i] = pcm.getInt16(i * 4 + 2, true) / 32768;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  // Drop-oldest discipline: if we've fallen >150 ms behind, snap to ~40 ms ahead.
  if (nextStartTime < now + 0.02 || nextStartTime > now + 0.15) nextStartTime = now + 0.04;
  src.start(nextStartTime);
  nextStartTime += buf.duration;
}

// ---- transport ----
function tx(action) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "transport", action })); }
function showPlayer(on) { $("playerCard").classList.toggle("hide", !on); $("connectCard").classList.toggle("hide", on); }

$("connectBtn").onclick = () => { if (!audioCtx) startAudio(); audioCtx && audioCtx.resume(); connect(); };
$("playBtn").onclick = () => tx("toggle");
$("nextBtn").onclick = () => tx("next");
$("prevBtn").onclick = () => tx("prev");
$("muteBtn").onclick = () => {
  muted = !muted;
  $("muteBtn").textContent = muted ? "🔇 Muted" : "🔊 Listening";
  $("muteBtn").classList.toggle("active", muted);
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "output_mute", muted }));
};
$("disconnectBtn").onclick = () => { if (ws) ws.close(); };
$("code").addEventListener("input", (e) => e.target.value = e.target.value.replace(/\D/g, "").slice(0, 6));
</script>
</body>
</html>
